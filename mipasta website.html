<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiPASTA — Enjoy Your Pasta | Rabat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --rose:#D94F6B;
  --vert:#1A5C45;
  --creme:#FAFAF7;
  --noir:#0D0D0D;
  --or:#C9A84C;
  --gris:#888;
  --bord:#E8E2DA;
  --rose-clair:#FDE8ED;
  --vert-clair:#E8F4EF;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--creme);color:var(--noir);overflow-x:hidden;}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--noir);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease;}
#loader.hide{opacity:0;pointer-events:none;}
#loader img{width:100px;animation:fadeIn 1s ease;}
#loader p{color:rgba(255,255,255,.4);font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-top:20px;animation:fadeIn 1.5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(250,250,247,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-wrap img{height:36px;width:auto;}
.insta-btn{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;}

/* HERO */
.hero{min-height:100vh;background:var(--noir);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 60px;text-align:center;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(26,92,69,.4) 0%,transparent 60%),radial-gradient(ellipse at 100% 100%,rgba(217,79,107,.15) 0%,transparent 50%);pointer-events:none;}
.hero-logo{width:110px;margin:0 auto 32px;filter:brightness(0) invert(1);animation:fadeIn 1s ease;}
.hero-eyebrow{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--rose);margin-bottom:20px;opacity:.9;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(56px,14vw,96px);font-weight:700;color:#fff;line-height:.95;margin-bottom:20px;letter-spacing:-1px;}
.hero-title em{color:var(--rose);font-style:italic;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:4px;text-transform:uppercase;margin-bottom:48px;}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-primary{background:var(--rose);color:#fff;border:none;border-radius:4px;padding:15px 32px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.btn-primary:hover{background:#c0395a;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.25);border-radius:4px;padding:15px 32px;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;text-decoration:none;display:inline-block;}
.btn-ghost:hover{border-color:rgba(255,255,255,.6);color:#fff;}
.hero-stats{display:flex;gap:40px;margin-top:64px;padding-top:40px;border-top:1px solid rgba(255,255,255,.08);}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;color:#fff;}
.stat-num span{color:var(--rose);}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* NAV */
.nav{background:#fff;position:sticky;top:64px;z-index:90;border-bottom:1px solid var(--bord);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-inner{display:flex;padding:0 20px;min-width:max-content;}
.nav-btn{padding:16px 20px;font-size:12px;font-weight:600;color:var(--gris);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;background:none;border-left:none;border-right:none;border-top:none;}
.nav-btn.active,.nav-btn:hover{color:var(--rose);border-bottom-color:var(--rose);}

/* SECTIONS */
.section{display:none;padding:28px 16px 48px;}
.section.active{display:block;}
.sec-head{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--bord);}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--noir);margin-bottom:4px;}
.sec-ar{font-size:13px;color:var(--rose);font-weight:600;margin-bottom:4px;}
.sec-desc{font-size:12px;color:var(--gris);}

/* CATEGORY */
.cat{display:flex;align-items:center;gap:10px;margin:24px 0 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--gris);}
.cat::after{content:'';flex:1;height:1px;background:var(--bord);}

/* CARDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.card{background:#fff;border-radius:8px;padding:14px;border:1px solid var(--bord);cursor:pointer;position:relative;transition:all .2s;}
.card:hover{border-color:var(--rose);box-shadow:0 4px 20px rgba(217,79,107,.08);}
.card-emoji{font-size:28px;margin-bottom:10px;display:block;}
.card-name{font-weight:700;font-size:12px;color:var(--noir);margin-bottom:3px;line-height:1.3;}
.card-desc{font-size:10px;color:var(--gris);line-height:1.5;margin-bottom:8px;}
.card-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--rose);}
.card-price small{font-size:11px;color:var(--gris);font-family:'Inter',sans-serif;}
.badge{position:absolute;top:8px;right:8px;font-size:8px;font-weight:700;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;}
.badge-best{background:var(--or);color:#fff;}
.badge-new{background:var(--rose);color:#fff;}

/* ROW CARD */
.row{background:#fff;border-radius:8px;padding:14px 16px;border:1px solid var(--bord);display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;transition:all .2s;cursor:pointer;}
.row:hover{border-color:var(--rose);}
.row-name{font-weight:600;font-size:13px;color:var(--noir);margin-bottom:2px;}
.row-desc{font-size:11px;color:var(--gris);}
.price-m{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--rose);}
.price-l{font-size:10px;color:var(--gris);}

/* COMPOSE */
.compose-box{background:#fff;border-radius:8px;padding:18px;border:1px solid var(--bord);margin-bottom:14px;}
.step-row{display:flex;gap:14px;margin-bottom:18px;}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--vert);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-body h4{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--noir);}
.sizes{display:flex;gap:8px;}
.size-opt{padding:10px 20px;border-radius:6px;border:1.5px solid var(--bord);text-align:center;cursor:pointer;transition:all .2s;}
.size-opt.sel{border-color:var(--vert);background:var(--vert-clair);}
.size-lbl{font-size:16px;font-weight:800;color:var(--vert);display:block;}
.size-price{font-size:11px;color:var(--rose);font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bord);font-size:11px;cursor:pointer;transition:all .2s;background:#fff;font-weight:500;}
.chip.sel{background:var(--rose);border-color:var(--rose);color:#fff;}
.sauce-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sauce-opt{padding:8px;border-radius:6px;border:1.5px solid var(--bord);font-size:11px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;}
.sauce-opt.sel{background:var(--vert-clair);border-color:var(--vert);color:var(--vert);font-weight:700;}

/* SPECIAL */
.special{background:var(--rose-clair);border-radius:8px;padding:14px;border:1px solid #F5C6D0;margin-bottom:14px;}
.special h4{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--rose);margin-bottom:10px;}
.spec-chips{display:flex;flex-wrap:wrap;gap:6px;}
.spec-chip{background:#fff;border:1px solid #F5C6D0;border-radius:20px;padding:5px 12px;font-size:11px;}
.spec-chip span{color:var(--rose);font-weight:700;}

/* LIST */
.list{background:#fff;border-radius:8px;border:1px solid var(--bord);overflow:hidden;margin-bottom:14px;}
.li{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bord);}
.li:last-child{border-bottom:none;}
.li-l{display:flex;align-items:center;gap:10px;}
.li-emoji{font-size:18px;}
.li-name{font-size:13px;font-weight:500;}
.li-name small{display:block;font-size:10px;color:var(--gris);font-weight:400;}
.li-price{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--rose);}
.best-tag{font-size:8px;background:var(--or);color:#fff;padding:2px 6px;border-radius:3px;margin-left:5px;font-weight:700;letter-spacing:.5px;}

/* PROMO */
.combo{background:var(--noir);border-radius:12px;padding:24px 20px;color:#fff;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;}
.combo::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(217,79,107,.3),transparent);pointer-events:none;}
.combo-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--rose);margin-bottom:12px;}
.combo-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;margin-bottom:6px;}
.combo-big{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:700;color:var(--rose);line-height:1;margin:10px 0;}
.combo-items{display:flex;justify-content:center;gap:10px;margin-top:16px;}
.combo-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 14px;font-size:11px;font-weight:600;}
.combo-item .ei{font-size:24px;display:block;margin-bottom:4px;}
.promo-green{background:var(--vert);border-radius:10px;padding:18px;color:#fff;margin-bottom:12px;}
.promo-green h3{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:6px;}
.promo-green p{font-size:12px;opacity:.8;margin-bottom:12px;}
.promo-pill{background:var(--rose);display:inline-block;padding:6px 16px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}

/* FOOTER */
.footer{background:var(--noir);color:#fff;padding:40px 20px;text-align:center;}
.foot-logo{height:50px;width:auto;filter:brightness(0) invert(1);margin-bottom:16px;}
.foot-tagline{font-size:10px;letter-spacing:4px;text-transform:uppercase;opacity:.4;margin-bottom:20px;}
.foot-insta{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;border-radius:4px;padding:10px 20px;font-size:12px;font-weight:700;text-decoration:none;margin-bottom:20px;letter-spacing:.5px;text-transform:uppercase;}
.foot-city{font-size:12px;opacity:.4;margin-top:8px;letter-spacing:1px;}
.foot-copy{font-size:10px;opacity:.25;margin-top:12px;}

.reveal{opacity:0;transform:translateY(16px);transition:opacity .4s,transform .4s;}
.reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
